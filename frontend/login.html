<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechVerse Market | Log in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="page">
    <section class="form-card">
      <h2>Log in</h2>
      <form id="login-form" class="form-grid">
        <input id="login-email" class="input" type="email" placeholder="Email" required>
        <input id="login-password" class="input" type="password" placeholder="Password" required>
        <button class="btn" type="submit">Accedi</button>
      </form>
      <p class="muted">Admin demo: admin@ecommerce.local / Admin123!</p>
      <p id="status-box" class="status info">Inserisci credenziali per accedere.</p>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="login.js"></script>
</body>
</html>

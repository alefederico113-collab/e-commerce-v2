<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechVerse Market | Sign up</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="page">
    <section class="form-card">
      <h2>Sign up</h2>
      <form id="signup-form" class="form-grid">
        <input id="signup-name" class="input" type="text" placeholder="Nome completo" required>
        <input id="signup-email" class="input" type="email" placeholder="Email" required>
        <input id="signup-password" class="input" type="password" placeholder="Password (min 8 caratteri)" required>
        <button class="btn" type="submit">Crea account</button>
      </form>
      <p id="status-box" class="status info">Registrati per iniziare a comprare.</p>
    </section>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/signup.js"></script>
</body>
</html>
